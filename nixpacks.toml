[phases.setup]
nixPkgs = ["php84", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.tokenizer", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.curl", "php84Extensions.fileinfo", "php84Extensions.openssl", "php84Extensions.gd", "php84Extensions.zip", "composer"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan migrate --force",
    "php artisan storage:link"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"