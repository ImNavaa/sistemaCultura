[phases.setup]
nixPkgs = ["php84", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.tokenizer", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.curl", "php84Extensions.fileinfo", "php84Extensions.openssl", "php84Extensions.gd", "php84Extensions.zip", "composer"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "php artisan config:clear",
    "php artisan cache:clear",
    "php artisan route:clear",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan migrate --force",
    "php artisan db:seed --force",
    "php artisan storage:link"
]

[start]
cmd = "php -S 0.0.0.0:$PORT -t public"